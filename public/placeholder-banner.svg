<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- House silhouette -->
  <g transform="translate(500, 80)" opacity="0.15">
    <path d="M0 200 L100 100 L200 50 L300 100 L400 200 L400 320 L0 320 Z" fill="#4a5568"/>
    <rect x="140" y="180" width="120" height="140" fill="#e8f4f8"/>
    <rect x="160" y="120" width="40" height="60" fill="#e8f4f8"/>
    <rect x="220" y="120" width="40" height="60" fill="#e8f4f8"/>
    <rect x="170" y="200" width="30" height="40" fill="#e8f4f8"/>
    <rect x="220" y="200" width="30" height="40" fill="#e8f4f8"/>
    <!-- Garage -->
    <rect x="60" y="200" width="70" height="120" fill="#e8f4f8"/>
  </g>
  <!-- Trees -->
  <g transform="translate(100, 250)" opacity="0.2">
    <circle cx="50" cy="50" r="40" fill="#6b8e7b"/>
    <circle cx="30" cy="60" r="30" fill="#7a9e8b"/>
    <circle cx="70" cy="60" r="35" fill="#6b8e7b"/>
    <rect x="45" y="90" width="10" height="30" fill="#8b7355"/>
  </g>
  <g transform="translate(650, 260)" opacity="0.2">
    <circle cx="40" cy="40" r="35" fill="#6b8e7b"/>
    <circle cx="25" cy="50" r="25" fill="#7a9e8b"/>
    <circle cx="55" cy="50" r="30" fill="#6b8e7b"/>
    <rect x="35" y="80" width="10" height="25" fill="#8b7355"/>
  </g>
  <!-- Text -->
  <text x="150" y="160" font-family="Inter, sans-serif" font-weight="900" font-size="72" fill="#1a365d" letter-spacing="-2">PHOTO</text>
  <text x="150" y="230" font-family="Inter, sans-serif" font-weight="900" font-size="72" fill="#1a365d" letter-spacing="-2">COMING SOON</text>
  <!-- Decorative line -->
  <line x1="150" y1="260" x2="380" y2="260" stroke="#a0aec0" stroke-width="1"/>
  <!-- House icon -->
  <g transform="translate(255, 240)">
    <path d="M0 20 L15 5 L30 20 L30 30 L0 30 Z" fill="none" stroke="#a0aec0" stroke-width="1.5"/>
    <rect x="10" y="18" width="10" height="12" fill="none" stroke="#a0aec0" stroke-width="1"/>
  </g>
  <line x1="275" y1="260" x2="500" y2="260" stroke="#a0aec0" stroke-width="1"/>
  <!-- Subtitle -->
  <text x="150" y="290" font-family="Inter, sans-serif" font-weight="500" font-size="18" fill="#718096" letter-spacing="3">STAY TUNED FOR PHOTOS</text>
</svg>
